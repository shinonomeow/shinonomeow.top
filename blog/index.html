er" data-v-54643d36></span><!--[--><!--[--><a class="vp-link link" href="/blog/categories/?id=4a9315" data-v-54643d36><!--[-->tools<!--]--><!----></a><!----><!--]--><!--]--></div><!----><div class="create-time" data-v-54643d36><span class="icon vpi-clock" data-v-54643d36></span><span data-v-54643d36>2025-02-18</span></div></div><!----></div></div></template><template><div class="vp-blog-post-item" data-allow-mismatch data-v-801a6462 data-v-54643d36><!----><div class="blog-post-item-content" data-v-54643d36><h3 data-v-54643d36><!----><!----><a class="vp-link link" href="/learn/hoRL/oe4mtx9w/" data-v-54643d36><!--[-->并行 ppo 源码精读<!--]--><!----></a></h3><div class="post-meta" data-v-54643d36><div class="category-list" data-v-54643d36><span class="icon vpi-folder" data-v-54643d36></span><!--[--><!--[--><a class="vp-link link" href="/blog/categories/?id=987a5d" data-v-54643d36><!--[-->learning_note<!--]--><!----></a><span data-v-54643d36>/</span><!--]--><!--[--><a class="vp-link link" href="/blog/categories/?id=a246d3" data-v-54643d36><!--[-->Hands_On_Reinforcement_Learnng<!--]--><!----></a><!----><!--]--><!--]--></div><!----><div class="create-time" data-v-54643d36><span class="icon vpi-clock" data-v-54643d36></span><span data-v-54643d36>2025-02-12</span></div></div><div class="vp-doc excerpt" data-v-54643d36><p>ppo 可以认为是一个提高了样本利用效率的 a2c。而从 ppo 到 mappo，需要的更多的也是工程上面的进步。</p>
<p>本次的 PPO 采用的是 <a href="https://github.com/ikostrikov/pytorch-a2c-ppo-acktr-gail" target="_blank" rel="noopener noreferrer">pytorch</a> 的实现</p>
<p>是在这篇<a href="https://www.meltycriss.com/2018/10/09/source-ppo/" target="_blank" rel="noopener noreferrer">源码阅读《PyTorch PPO》</a> 的基础上讲的。</p>
<p>然后我自已对代码进行了一些精简和注释, 删除了 rnn 部份，对其他环境的适配也删除了， 只留下了 CartPole-v1 和 Pendulum-v1 的部份。
